<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#07070A">
    <meta name="color-scheme" content="dark">
    <meta name="description" content="Eleven friends. Four years. A lifetime of memories.">
    <title>{% block title %}Elon Boys{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23FF6B35'/><text x='16' y='22' text-anchor='middle' fill='%23F8FAFC' font-size='16' font-weight='800' font-family='system-ui'>EB</text></svg>">
    <link rel="stylesheet" href="/static/css/public.css?v=3">
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: '#07070A',
            surface: '#13131A',
            'surface-elevated': '#1C1C28',
            ember: '#FF6B35',
            'ember-hover': '#FF8555',
            violet: '#7C3AED',
            cyan: '#06B6D4',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="font-sans bg-[#07070A] text-[#F8FAFC] flex flex-col min-h-screen{% block body_class %}{% endblock %}">
    <div class="ambient-mesh" aria-hidden="true">
        <blob></blob>
        <blob></blob>
        <blob></blob>
        <blob></blob>
    </div>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    {% include "partials/_nav.html" %}
    {% include "partials/_toast.html" %}

    {% block hero %}{% endblock %}

    <main id="main-content" class="relative z-base flex-grow w-full{% block main_class %}{% endblock %}" role="main">
        {% block content %}{% endblock %}
    </main>

    <button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" class="fixed bottom-6 right-6 z-sticky w-9 h-9 rounded-lg glass flex items-center justify-center text-[#94A3B8] hover:text-[#FF6B35] hover:border-[#FF6B35] transition-all duration-200" aria-label="Scroll to top">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    {% include "partials/_footer.html" %}

    <script src="/static/js/ui.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
