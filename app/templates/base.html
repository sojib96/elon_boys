<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Friends Group{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#faf7f2] text-stone-800 flex flex-col min-h-screen">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
            <a href="/" class="text-xl font-bold text-indigo-600">The Group</a>
            <div class="space-x-4 text-sm font-medium">
                <a href="/our-story" class="hover:text-indigo-600">Our Story</a>
                <a href="/squad" class="hover:text-indigo-600">The Squad</a>
                <a href="/timeline" class="hover:text-indigo-600">Timeline</a>
                <a href="/gallery" class="hover:text-indigo-600">Gallery</a>
                <a href="/updates" class="hover:text-indigo-600">Updates</a>
                <a href="/events" class="hover:text-indigo-600">Events</a>
                <a href="/guestbook" class="hover:text-indigo-600">Guestbook</a>
                <a href="/contact" class="hover:text-indigo-600">Contact</a>
                <a href="/login" class="ml-4 text-indigo-600 border border-indigo-600 px-3 py-1 rounded hover:bg-indigo-600 hover:text-white">Login</a>
            </div>
        </div>
    </nav>

    {% block hero %}{% endblock %}

    <main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t py-6 text-center text-sm text-stone-400">
        &copy; 2026 Friends Group &mdash; Built with memories.
    </footer>
</body>
</html>
