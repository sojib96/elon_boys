{% extends "base.html" %}
{% block title %}Contact — Elon Group{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="text-center mb-14 reveal">
        <span class="text-coral-600 text-[11px] uppercase tracking-wider font-semibold bg-white border border-coral-200 rounded-full px-4 py-1.5 inline-block mb-4">Reach Out</span>
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 tracking-[-0.02em]">Contact</h1>
        <p class="text-gray-500 text-sm mt-2">Get in touch with the group.</p>
    </div>

    <div class="bg-white rounded-xl shadow-card border border-gray-100 p-8 md:p-10 hover:shadow-card-hover transition-all duration-300 reveal">
        <div class="grid gap-8 md:grid-cols-3">
            <div class="flex flex-col items-center text-center p-4 hover:-translate-y-0.5 transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-coral-50 border border-coral-100 flex items-center justify-center text-lg mb-3 text-coral-500">&#9993;</div>
                <h3 class="font-semibold text-gray-900 text-[15px]">Email</h3>
                <p class="text-gray-400 text-sm mt-0.5">hello@thegroup.com</p>
            </div>
            <div class="flex flex-col items-center text-center p-4 hover:-translate-y-0.5 transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-coral-50 border border-coral-100 flex items-center justify-center text-lg mb-3 text-coral-500">&#128222;</div>
                <h3 class="font-semibold text-gray-900 text-[15px]">Phone</h3>
                <p class="text-gray-400 text-sm mt-0.5">+1 (555) 000-0000</p>
            </div>
            <div class="flex flex-col items-center text-center p-4 hover:-translate-y-0.5 transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-coral-50 border border-coral-100 flex items-center justify-center text-lg mb-3 text-coral-500">&#127760;</div>
                <h3 class="font-semibold text-gray-900 text-[15px]">Social</h3>
                <p class="text-gray-400 text-sm mt-0.5">Instagram &middot; Twitter &middot; Facebook</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
