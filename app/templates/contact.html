{% extends "base.html" %}
{% block title %}Contact — Friends Group{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="text-center mb-14 reveal">
        <span class="text-[11px] uppercase tracking-[.2em] text-neutral-warm-400 font-medium">Reach Out</span>
        <h1 class="text-3xl md:text-4xl font-heading font-bold text-neutral-warm-900 mt-2">Contact</h1>
        <p class="text-neutral-warm-400 text-sm mt-2">Get in touch with the group.</p>
    </div>

    <div class="bg-white rounded-2xl border border-neutral-warm-200/80 p-8 md:p-10 hover:border-brand/20 transition-colors reveal">
        <div class="grid gap-8 md:grid-cols-3">
            <div class="flex flex-col items-center text-center p-4">
                <div class="w-12 h-12 rounded-xl bg-amber-50 border border-amber-200/60 flex items-center justify-center text-lg mb-3 text-amber-600">&#9993;</div>
                <p class="font-heading font-semibold text-neutral-warm-800 text-sm">Email</p>
                <p class="text-neutral-warm-400 text-sm mt-0.5">hello@thegroup.com</p>
            </div>
            <div class="flex flex-col items-center text-center p-4">
                <div class="w-12 h-12 rounded-xl bg-sky-50 border border-sky-200/60 flex items-center justify-center text-lg mb-3 text-sky-600">&#128222;</div>
                <p class="font-heading font-semibold text-neutral-warm-800 text-sm">Phone</p>
                <p class="text-neutral-warm-400 text-sm mt-0.5">+1 (555) 000-0000</p>
            </div>
            <div class="flex flex-col items-center text-center p-4">
                <div class="w-12 h-12 rounded-xl bg-purple-50 border border-purple-200/60 flex items-center justify-center text-lg mb-3 text-purple-600">&#127760;</div>
                <p class="font-heading font-semibold text-neutral-warm-800 text-sm">Social</p>
                <p class="text-neutral-warm-400 text-sm mt-0.5">Instagram &middot; Twitter &middot; Facebook</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
