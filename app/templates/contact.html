{% extends "base.html" %}
{% block title %}Contact — Friends Group{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="text-center mb-14 reveal">
        <span class="text-[11px] uppercase tracking-[.2em] text-neutral-400 font-medium font-sans">Reach Out</span>
        <h1 class="text-3xl md:text-4xl font-heading font-bold text-neutral-900 mt-2">Contact</h1>
        <p class="text-neutral-400 text-sm mt-2">Get in touch with the group.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-neutral-200/60 p-8 md:p-10 hover:shadow-md transition-all duration-300 reveal card-sparkle">
        <div class="grid gap-8 md:grid-cols-3">
            <div class="flex flex-col items-center text-center p-4 group hover:-translate-y-1 transition-all duration-300">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-50 to-rose-50 border border-amber-200/60 flex items-center justify-center text-xl mb-3 text-rose-500 group-hover:scale-110 group-hover:-rotate-3 transition-all duration-300">&#9993;</div>
                <h3 class="font-heading font-semibold text-neutral-800 text-[15px]">Email</h3>
                <p class="text-neutral-400 text-sm mt-0.5">hello@thegroup.com</p>
            </div>
            <div class="flex flex-col items-center text-center p-4 group hover:-translate-y-1 transition-all duration-300">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-50 to-violet-50 border border-sky-200/60 flex items-center justify-center text-xl mb-3 text-sky-500 group-hover:scale-110 group-hover:-rotate-3 transition-all duration-300">&#128222;</div>
                <h3 class="font-heading font-semibold text-neutral-800 text-[15px]">Phone</h3>
                <p class="text-neutral-400 text-sm mt-0.5">+1 (555) 000-0000</p>
            </div>
            <div class="flex flex-col items-center text-center p-4 group hover:-translate-y-1 transition-all duration-300">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-50 to-pink-50 border border-violet-200/60 flex items-center justify-center text-xl mb-3 text-violet-500 group-hover:scale-110 group-hover:-rotate-3 transition-all duration-300">&#127760;</div>
                <h3 class="font-heading font-semibold text-neutral-800 text-[15px]">Social</h3>
                <p class="text-neutral-400 text-sm mt-0.5">Instagram &middot; Twitter &middot; Facebook</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
