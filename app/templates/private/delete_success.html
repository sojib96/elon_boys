{% extends "base.html" %}
{% block title %}Post Deleted — Elon Boys{% endblock %}
{% block body_class %} page-private{% endblock %}

{% block content %}
<link rel="stylesheet" href="/static/css/private.css">

<div class="dossier-page flex items-center justify-center pt-0 pb-0">
  <div class="w-full max-w-sm reveal">
    <div class="success-card">
      <div class="success-icon-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1 class="success-title">Post Deleted</h1>
      <p class="success-body">&ldquo;{{ post_title }}&rdquo; has been moved to the trash.<br>You can restore it from the trash at any time.</p>
      <a href="/updates" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to Updates
      </a>
    </div>
  </div>
</div>
{% endblock %}
