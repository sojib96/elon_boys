{% extends "base.html" %}
{% block title %}Member Login — Elon Boys{% endblock %}
{% block body_class %} page-private{% endblock %}

{% block content %}
<link rel="stylesheet" href="/static/css/private.css">

<div class="dossier-page flex items-center justify-center pt-0 pb-0">
  <div class="w-full max-w-sm reveal">
    <div class="text-center mb-8">
      <span class="eyebrow">Private</span>
      <h1 class="font-['Playfair_Display'] text-[clamp(1.8rem,4vw,2.5rem)] font-bold text-[#1A1614] tracking-[-0.02em] leading-[1.08] mt-5 mb-2">
        Member Login
      </h1>
      <p class="font-['Fraunces'] text-[14px] italic text-[#8A7F76]">Private area for the 11 of us.</p>
    </div>

    <div class="dossier-card accent-terracotta">
      <div class="dossier-card-body">
        {% if error %}
        <div class="banner-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
          <div class="field-row">
            <label class="field-label" for="identifier">Username or Email</label>
            <input type="text" id="identifier" name="identifier" class="field-input" placeholder="Enter your username or email" required>
          </div>
          <div class="field-row">
            <label class="field-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="field-input" placeholder="Enter your password" required>
          </div>
          <div class="text-center pt-4">
            <button type="submit" class="btn btn-primary w-full justify-center">Sign In</button>
          </div>
        </form>
        <div class="text-center mt-4">
          <a href="/forgot-password" class="back-link text-[10px]">Forgot your password?</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
