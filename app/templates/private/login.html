{% extends "base.html" %}
{% block title %}Member Login — Friends Group{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
    <div class="text-center mb-8 reveal">
        <span class="text-[11px] uppercase tracking-[.2em] text-neutral-400 font-medium font-sans">Private</span>
        <h1 class="text-2xl font-heading font-bold text-neutral-900 mt-2">Member Login</h1>
        <p class="text-neutral-400 text-sm mt-1">Private area for the 10 of us.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-neutral-200/60 p-8 reveal card-sparkle">
        <div class="h-1 w-16 bg-gradient-to-r from-brand to-rose-500 rounded-full mb-6 mx-auto"></div>
        <form>
            <div class="mb-4">
                <label class="block text-neutral-700 text-sm font-medium mb-1.5">Username</label>
                <input type="text" class="w-full border border-neutral-200/80 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all bg-neutral-50 focus:bg-white" placeholder="Enter your username">
            </div>
            <div class="mb-6">
                <label class="block text-neutral-700 text-sm font-medium mb-1.5">Password</label>
                <input type="password" class="w-full border border-neutral-200/80 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/20 focus:border-brand transition-all bg-neutral-50 focus:bg-white" placeholder="Enter your password">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-brand to-rose-500 hover:from-brand-dark hover:to-rose-600 text-white font-medium py-2.5 rounded-xl transition-all duration-300 text-sm shadow-sm hover:shadow-md">Sign In</button>
        </form>
        <p class="text-neutral-400 text-xs text-center mt-4 italic">Authentication coming in a future sprint.</p>
    </div>
</div>
{% endblock %}
