{% extends "base.html" %}
{% block title %}Member Login — Elon Group{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-8">
    <div class="text-center mb-8 reveal">
        <span class="text-coral-600 text-[11px] uppercase tracking-wider font-semibold bg-white border border-coral-200 rounded-full px-4 py-1.5 inline-block mb-4">Private</span>
        <h1 class="text-2xl font-bold text-gray-900 tracking-[-0.02em]">Member Login</h1>
        <p class="text-gray-500 text-sm mt-1">Private area for the 10 of us.</p>
    </div>

    <div class="bg-white rounded-xl shadow-card border border-gray-100 p-8 reveal">
        <form>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-1.5">Username</label>
                <input type="text" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-coral-500/20 focus:border-coral-500 transition-all bg-gray-50 focus:bg-white" placeholder="Enter your username">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-medium mb-1.5">Password</label>
                <input type="password" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-coral-500/20 focus:border-coral-500 transition-all bg-gray-50 focus:bg-white" placeholder="Enter your password">
            </div>
            <button type="submit" class="w-full bg-coral-500 hover:bg-coral-600 text-white font-medium py-2.5 rounded-lg transition-all duration-200 text-sm shadow-sm hover:shadow-glow">Sign In</button>
        </form>
        <p class="text-gray-400 text-xs text-center mt-4 italic">Authentication coming in a future sprint.</p>
    </div>
</div>
{% endblock %}
